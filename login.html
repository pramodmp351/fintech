<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FinVault - Secure Fintech Login" />
    <title>FinVault - Login</title>
    <link rel="icon" type="image/webp" href="./assets/logo.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --red-primary: #dc143c;
        --red-dark: #8b0000;
        --red-light: #ff6b6b;
        --red-accent: #ff4444;
        --bg-dark: #0c0c0e;
        --bg-card: #1a1a1f;
        --bg-input: #25252b;
        --text: #f5f5f5;
        --text-muted: #a0a0b0;
        --border: rgba(255, 255, 255, 0.06);
        --radius: 16px;
        --radius-sm: 10px;
        --shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
        font-size: 16px;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-dark);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        position: relative;
        overflow-x: hidden;
      }

      /* Background glow */
      .bg-glow {
        position: fixed;
        top: -100px;
        left: -100px;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(220, 20, 60, 0.2) 0%,
          transparent 70%
        );
        border-radius: 50%;
        filter: blur(50px);
        pointer-events: none;
        z-index: 0;
      }
      .bg-glow-2 {
        position: fixed;
        bottom: -100px;
        right: -100px;
        width: 350px;
        height: 350px;
        background: radial-gradient(
          circle,
          rgba(255, 68, 68, 0.15) 0%,
          transparent 70%
        );
        border-radius: 50%;
        filter: blur(50px);
        pointer-events: none;
        z-index: 0;
      }

      .login-container {
        width: 100%;
        max-width: 420px;
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 2.5rem 2rem;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        position: relative;
        z-index: 2;
        backdrop-filter: blur(10px);
      }

      .logo-area {
        text-align: center;
        margin-bottom: 2rem;
      }

      .logo-area img {
        width: 56px;
        height: 56px;
        margin: 0 auto 0.8rem;
        filter: drop-shadow(0 0 8px var(--red-primary));
      }

      .logo-text {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 2rem;
        letter-spacing: -0.5px;
        background: linear-gradient(
          135deg,
          var(--red-light),
          var(--red-primary)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      h1 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 1.5rem;
        text-align: center;
        margin-bottom: 1.5rem;
        color: var(--text);
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        font-weight: 600;
      }

      input,
      select {
        width: 100%;
        padding: 0.9rem 1.2rem;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      input:focus,
      select:focus {
        border-color: var(--red-primary);
        box-shadow: 0 0 0 3px rgba(220, 20, 60, 0.15);
      }

      select {
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23A0A0B0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 1.2rem center;
        background-size: 12px;
        cursor: pointer;
      }

      .btn-login {
        width: 100%;
        padding: 0.95rem;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        background: linear-gradient(
          135deg,
          var(--red-primary),
          var(--red-dark)
        );
        color: white;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s;
        box-shadow: 0 6px 18px rgba(220, 20, 60, 0.4);
        margin-top: 0.5rem;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(220, 20, 60, 0.6);
      }

      .error-message {
        color: var(--red-light);
        font-size: 0.8rem;
        margin-top: 0.3rem;
        display: none;
      }

      .extra-links {
        display: flex;
        justify-content: space-between;
        margin-top: 1.2rem;
        font-size: 0.9rem;
      }

      .extra-links a {
        color: var(--red-light);
        text-decoration: none;
        font-weight: 500;
      }

      .extra-links a:hover {
        text-decoration: underline;
      }

      .company-info {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.8rem;
        line-height: 1.6;
      }

      @media (max-width: 480px) {
        .login-container {
          padding: 2rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>
    <div class="bg-glow-2" aria-hidden="true"></div>

    <div class="login-container">
      <div class="logo-area">
        <!-- <img
          src=""
          alt="FinVault Logo"
          width="56"
          height="56"
        /> -->
        <div class="logo-text">STACKLY</div>
      </div>
      <h1>Secure Login</h1>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="role">Account Type</label>
          <select id="role" required>
            <option value="">Select Role</option>
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="you@finvault.com"
            required
          />
          <div class="error-message" id="emailError">
            Please enter a valid email.
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
            minlength="4"
          />
          <div class="error-message" id="passwordError">
            Minimum 4 characters required.
          </div>
        </div>

        <button type="submit" class="btn-login">Sign In</button>
      </form>

      <div class="extra-links">
        <a href="404.html">Forgot Password?</a>
        <a href="signup.html">Create Account</a>
      </div>

      <div class="company-info">
        <p>© 2026 STACKLY. All rights reserved.</p>
        <p>123 Finance Street, New York, NY</p>
        <p>Terms • Privacy • Security</p>
      </div>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const roleSelect = document.getElementById("role");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const emailError = document.getElementById("emailError");
      const passwordError = document.getElementById("passwordError");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        emailError.style.display = "none";
        passwordError.style.display = "none";
        let valid = true;

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const role = roleSelect.value;

        if (!role) {
          alert("Please select an account type.");
          valid = false;
        }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          emailError.style.display = "block";
          valid = false;
        }
        if (!password || password.length < 4) {
          passwordError.style.display = "block";
          valid = false;
        }

        if (valid) {
          const userData = {
            email: email,
            role: role,
            loginTime: new Date().toISOString(),
          };
          localStorage.setItem("finvault_user", JSON.stringify(userData));

          if (role === "user") {
            window.location.href = "user-dashboard.html";
          } else if (role === "admin") {
            window.location.href = "admin-dashboard.html";
          }
        }
      });
    </script>
  </body>
</html>
